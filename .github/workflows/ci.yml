name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev
      - name: Lint
        run: uv run --python 3.11 ruff check .
      - name: Test
        run: uv run --python 3.11 pytest -q -m "not integration"
